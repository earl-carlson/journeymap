<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA Mapper</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Setup: first-time name + directory -->
  <div id="view-setup" class="view hidden">
    <div class="header">
      <h1>IA Mapper</h1>
    </div>
    <p class="description">Set your name and choose where session files are saved.</p>
    <div class="field">
      <label for="contributor">Your name</label>
      <input type="text" id="contributor" placeholder="e.g. Sarah" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Export directory</label>
      <button id="btn-pick-dir" class="btn btn-secondary btn-small">Choose folder...</button>
      <div id="setup-dir-name" class="dir-name"></div>
    </div>
    <button id="btn-save-setup" class="btn btn-primary">Save &amp; Continue</button>
  </div>

  <!-- Idle: ready to record a workflow -->
  <div id="view-idle" class="view hidden">
    <div class="header">
      <h1>IA Mapper</h1>
      <span class="badge badge-idle">Ready</span>
    </div>

    <div class="meta">
      <span class="meta-item">
        <span class="meta-label">Recorder:</span>
        <span id="idle-contributor">—</span>
        <button id="btn-change-name" class="btn-inline" title="Change settings">edit</button>
      </span>
      <span class="meta-item">
        <span class="meta-label">Saving to:</span>
        <span id="idle-dir" class="dir-display">—</span>
        <button id="btn-change-dir" class="btn-inline" title="Change directory">change</button>
      </span>
    </div>

    <div class="workflow-setup">
      <div class="field">
        <label for="idle-workflow-name">Workflow name</label>
        <input type="text" id="idle-workflow-name" placeholder="e.g. Upgrade to Team plan" autocomplete="off" spellcheck="false">
      </div>
      <div class="field">
        <label for="idle-persona">Persona</label>
        <select id="idle-persona">
          <option value="">— select persona —</option>
          <option value="Admin">Admin</option>
          <option value="Docker Employee">Docker Employee</option>
          <option value="Purchaser">Purchaser</option>
          <option value="Developer">Developer</option>
          <option value="VP of Engineering">VP of Engineering</option>
          <option value="__custom__">Other...</option>
        </select>
        <input type="text" id="idle-persona-custom" placeholder="Enter custom persona" autocomplete="off" spellcheck="false" style="display:none; margin-top:6px;">
      </div>
      <button id="btn-start" class="btn btn-primary">Start Recording</button>
    </div>
  </div>

  <!-- Active: workflow recording in progress -->
  <div id="view-active" class="view hidden">
    <div class="header">
      <h1>IA Mapper</h1>
      <span class="badge badge-active">Recording</span>
    </div>

    <!-- Workflow identity -->
    <div class="workflow-identity">
      <div class="workflow-identity-name" id="active-workflow-name">—</div>
      <div class="workflow-identity-meta">
        <span id="active-persona-badge" class="persona-badge hidden"></span>
        <span id="stat-nodes">0</span> pages
        &middot;
        <span id="stat-steps">0</span> steps
      </div>
    </div>

    <div class="meta">
      <span class="meta-item">
        <span class="meta-label">Recorder:</span>
        <span id="meta-contributor">—</span>
      </span>
      <span class="meta-item">
        <span class="meta-label">Saving to:</span>
        <span id="active-dir" class="dir-display">—</span>
      </span>
    </div>

    <!-- Current page info -->
    <div id="current-page" class="current-page hidden">
      <div class="section-label">Current Page</div>
      <div id="current-page-title" class="current-page-title">—</div>
      <div id="current-page-url" class="current-page-url">—</div>
      <div id="screenshot-status" class="screenshot-status">
        <span id="screenshot-indicator" class="screenshot-indicator"></span>
        <button id="btn-retrigger" class="btn-inline" title="Re-capture screenshot">retake screenshot</button>
      </div>
    </div>

    <div class="flags">
      <div class="section-label">Flag current page</div>
      <div class="flag-buttons">
        <button class="btn-flag" data-flag="broken">broken</button>
        <button class="btn-flag" data-flag="confusing">confusing</button>
        <button class="btn-flag" data-flag="missing">missing</button>
        <button class="btn-flag" data-flag="good">good</button>
      </div>
    </div>

    <!-- Recent pages -->
    <div id="recent-nodes" class="recent-nodes">
      <div class="section-label">Recent Pages</div>
      <div id="recent-list" class="recent-list"></div>
    </div>

    <!-- Workflow step editor (shown after Stop) -->
    <div id="workflow-edit" class="workflow-edit hidden">
      <div class="section-label">Review &amp; Edit Steps</div>
      <div class="field">
        <label for="wf-edit-name">Workflow name</label>
        <input type="text" id="wf-edit-name" autocomplete="off" spellcheck="false">
      </div>
      <div id="wf-edit-steps" class="wf-edit-steps"></div>
      <div class="workflow-prompt-actions">
        <button id="btn-wf-save" class="btn btn-primary btn-small">Save &amp; Export</button>
        <button id="btn-wf-discard" class="btn btn-secondary btn-small">Discard</button>
      </div>
    </div>

    <div id="actions-recording" class="actions">
      <button id="btn-stop" class="btn btn-danger">Stop &amp; Review</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
