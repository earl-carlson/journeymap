<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IA Mapper — Microphone Access</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      max-width: 360px;
      padding: 32px;
    }
    h2 { font-size: 18px; margin-bottom: 12px; }
    p { font-size: 13px; color: #8888aa; line-height: 1.6; margin-bottom: 20px; }
    button {
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      background: #4B7BE5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #818cf8; }
    .status {
      margin-top: 16px;
      font-size: 12px;
      color: #22c55e;
    }
    .status.error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Microphone Access</h2>
    <p>IA Mapper needs microphone access to record audio notes. Click below to grant permission — you only need to do this once.</p>
    <button id="btn-grant">Grant Microphone Access</button>
    <div id="status" class="status"></div>
  </div>
  <script src="mic-permission.js"></script>
</body>
</html>
