name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: viewer

      - name: Build (Pages mode — bundle exports)
        run: BUNDLE_EXPORTS=1 npm run build
        working-directory: viewer

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Copy assets into dist
        run: cp -r assets dist/assets

      - name: Build deck (HTML)
        run: |
          marp docker-ia-map-deck.md \
            --html \
            --allow-local-files \
            --theme-set assets/docker-light.css \
            --output dist/docker-ia-map-deck.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
